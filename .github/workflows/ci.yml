name: CI

on:
  push:
    branches: [main, "claude/*"]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @grocery/shared build

      - name: Typecheck shared
        run: pnpm --filter @grocery/shared typecheck

      - name: Typecheck API
        run: pnpm --filter @grocery/api typecheck

      - name: Lint
        run: pnpm lint
